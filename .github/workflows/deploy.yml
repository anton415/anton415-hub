name: Deploy Production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, branch, tag, or SHA to deploy
        required: true
        default: main
      image_tag:
        description: Optional image tag. Defaults to the short commit SHA.
        required: false
        default: ""

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://anton415.ru
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      IMAGE_NAME: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/anton415-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.image_tag }}"
          fi
          if [ -z "$version" ]; then
            version="$short_sha"
          fi
          {
            echo "tag=$version"
            echo "short_sha=$short_sha"
            echo "image=${IMAGE_NAME}:${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Yandex Container Registry
        env:
          YC_SA_JSON_KEY: ${{ secrets.YC_SA_JSON_KEY }}
        run: |
          printf '%s' "$YC_SA_JSON_KEY" | docker login --username json_key --password-stdin cr.yandex

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}

      - name: Install Yandex Cloud CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        shell: bash
        env:
          YC_SA_JSON_KEY: ${{ secrets.YC_SA_JSON_KEY }}
        run: |
          set -euo pipefail
          key_file="${RUNNER_TEMP}/yc-sa-key.json"
          printf '%s' "$YC_SA_JSON_KEY" > "$key_file"
          chmod 0600 "$key_file"
          yc config profile create deploy >/dev/null
          yc config set service-account-key "$key_file" >/dev/null

      - name: Authorize GitHub runner SSH
        id: ssh_ingress
        shell: bash
        env:
          YC_APP_SECURITY_GROUP_ID: ${{ vars.YC_APP_SECURITY_GROUP_ID }}
          SSH_RULE_DESCRIPTION: github-actions-deploy-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "$YC_APP_SECURITY_GROUP_ID" ]; then
            echo "YC_APP_SECURITY_GROUP_ID repository variable is required" >&2
            exit 64
          fi

          runner_ip="$(curl -fsS https://api.ipify.org)"
          runner_cidr="${runner_ip}/32"
          yc vpc security-group update-rules \
            --id "$YC_APP_SECURITY_GROUP_ID" \
            --add-rule "direction=ingress,protocol=tcp,port=22,v4-cidrs=$runner_cidr,description=$SSH_RULE_DESCRIPTION" \
            >/dev/null

          rule_id="$(yc vpc security-group get --id "$YC_APP_SECURITY_GROUP_ID" --format json \
            | jq -r --arg description "$SSH_RULE_DESCRIPTION" '.rules[] | select(.description == $description) | .id' \
            | tail -n 1)"
          if [ -z "$rule_id" ]; then
            echo "created SSH ingress rule was not found for cleanup" >&2
            exit 1
          fi

          echo "rule_id=$rule_id" >> "$GITHUB_OUTPUT"
          echo "runner_cidr=$runner_cidr" >> "$GITHUB_OUTPUT"
          echo "Authorized temporary SSH ingress from ${runner_cidr}"

      - name: Deploy on production VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/anton415-hub"
            OLD_APP_DIR="/opt/anton415-os"
            COMPOSE_FILE="${APP_DIR}/docker-compose.yml"
            OLD_COMPOSE_FILE="${OLD_APP_DIR}/docker-compose.yml"
            ENV_FILE="${APP_DIR}/app.env"
            SECRETS_FILE="${APP_DIR}/secrets.env"
            POSTGRES_ENV_FILE="${APP_DIR}/postgres.env"
            N8N_ENV_FILE="${APP_DIR}/n8n.env"
            N8N_POSTGRES_ENV_FILE="${APP_DIR}/n8n-postgres.env"
            N8N_WORKFLOW_DIR="${APP_DIR}/n8n/workflows"
            N8N_WORKFLOW_ID="orchestrator-ai-feature-delivery-v0"
            N8N_WORKFLOW_FILE="${N8N_WORKFLOW_DIR}/${N8N_WORKFLOW_ID}.json"
            MIGRATE_SCRIPT="${APP_DIR}/run-migrations.sh"
            DB_MIGRATION_MARKER="${APP_DIR}/.anton415-hub-db-migrated"
            DB_NAME="anton415_hub"
            DB_USER="anton415_hub_app"
            LOCKBOX_SECRET_ID="e6qfeq82r1rpv9vot1dt"
            image="${{ steps.image.outputs.image }}"
            app_version="${{ steps.image.outputs.tag }}"

            read_env() {
              file="$1"
              key="$2"
              if [ -f "$file" ]; then
                sudo awk -F= -v key="$key" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' "$file"
              fi
            }

            upsert_env() {
              key="$1"
              value="$2"
              tmp="$(mktemp)"
              sudo awk -v key="$key" -v value="$value" '
                BEGIN { found = 0 }
                $0 ~ "^" key "=" {
                  print key "=" value
                  found = 1
                  next
                }
                { print }
                END {
                  if (!found) {
                    print key "=" value
                  }
                }
              ' "$ENV_FILE" > "$tmp"
              sudo install -m 0600 "$tmp" "$ENV_FILE"
              rm -f "$tmp"
            }

            remove_env() {
              key="$1"
              tmp="$(mktemp)"
              sudo awk -F= -v key="$key" '$1 != key { print }' "$ENV_FILE" > "$tmp"
              sudo install -m 0600 "$tmp" "$ENV_FILE"
              rm -f "$tmp"
            }

            env_has_nonempty_key() {
              file="$1"
              key="$2"
              [ -f "$file" ] || return 1
              sudo awk -F= -v key="$key" '
                $1 == key {
                  value = substr($0, index($0, "=") + 1)
                  if (length(value) > 0) {
                    found = 1
                  }
                }
                END { exit found ? 0 : 1 }
              ' "$file"
            }

            require_env_key() {
              file="$1"
              key="$2"
              if ! env_has_nonempty_key "$file" "$key"; then
                echo "$key is required in $file after Lockbox sync" >&2
                exit 64
              fi
            }

            write_lockbox_sync_script() {
              sudo tee "${APP_DIR}/sync-lockbox-env.sh" >/dev/null <<'LOCKBOX_SYNC'
            #!/bin/sh
            set -eu

            SECRET_ID="__LOCKBOX_SECRET_ID__"
            OUT="/opt/anton415-hub/secrets.env"
            POSTGRES_OUT="/opt/anton415-hub/postgres.env"
            TMP="$(mktemp)"
            OUT_TMP="$(mktemp)"

            cleanup() {
              rm -f "$TMP" "$OUT_TMP"
            }
            trap cleanup EXIT

            write_postgres_env() {
              password="$(awk -F= '$1 == "POSTGRES_PASSWORD" { sub(/^[^=]*=/, ""); print; found = 1; exit } END { exit found ? 0 : 1 }' "$OUT" || true)"
              if [ -z "$password" ]; then
                install -m 0600 /dev/null "$POSTGRES_OUT"
                return
              fi

              POSTGRES_TMP="$(mktemp)"
              printf 'POSTGRES_PASSWORD=%s\n' "$password" > "$POSTGRES_TMP"
              install -m 0600 "$POSTGRES_TMP" "$POSTGRES_OUT"
              rm -f "$POSTGRES_TMP"
            }

            TOKEN_JSON="$(curl -fsS -H 'Metadata-Flavor: Google' http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token)"
            IAM_TOKEN="$(printf '%s' "$TOKEN_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')"

            if curl -fsS \
              -H "Authorization: Bearer $IAM_TOKEN" \
              "https://payload.lockbox.api.cloud.yandex.net/lockbox/v1/secrets/$SECRET_ID/payload" \
              -o "$TMP"; then
              python3 - "$TMP" > "$OUT_TMP" <<'PY'
            import base64
            import json
            import re
            import sys

            key_pattern = re.compile(r"^[A-Z0-9_]+$")

            with open(sys.argv[1], "r", encoding="utf-8") as fh:
                payload = json.load(fh)

            for entry in payload.get("entries", []):
                key = entry.get("key", "")
                if not key_pattern.match(key):
                    raise SystemExit(f"invalid env key in Lockbox payload: {key!r}")

                if "textValue" in entry:
                    value = entry["textValue"]
                elif "binaryValue" in entry:
                    value = base64.b64decode(entry["binaryValue"]).decode("utf-8")
                else:
                    value = ""

                if "\n" in value or "\r" in value:
                    raise SystemExit(f"multiline env value is not supported for {key}")

                print(f"{key}={value}")
            PY
              install -m 0600 "$OUT_TMP" "$OUT"
            else
              install -m 0600 /dev/null "$OUT"
            fi
            write_postgres_env
            LOCKBOX_SYNC
              sudo sed -i "s#__LOCKBOX_SECRET_ID__#${LOCKBOX_SECRET_ID}#g" "${APP_DIR}/sync-lockbox-env.sh"
              sudo chmod 0700 "${APP_DIR}/sync-lockbox-env.sh"
            }

            write_postgres_env_file() {
              db_password="$(read_env "$SECRETS_FILE" POSTGRES_PASSWORD || true)"
              if [ -z "$db_password" ]; then
                sudo install -m 0600 /dev/null "$POSTGRES_ENV_FILE"
                return
              fi

              tmp="$(mktemp)"
              printf 'POSTGRES_PASSWORD=%s\n' "$db_password" > "$tmp"
              sudo install -m 0600 "$tmp" "$POSTGRES_ENV_FILE"
              rm -f "$tmp"
            }

            write_n8n_env_files() {
              n8n_db_password="$(read_env "$SECRETS_FILE" N8N_POSTGRES_PASSWORD || true)"
              n8n_encryption_key="$(read_env "$SECRETS_FILE" N8N_ENCRYPTION_KEY || true)"
              callback_token="$(read_env "$SECRETS_FILE" ORCHESTRATOR_N8N_CALLBACK_TOKEN || true)"
              openai_api_key="$(read_env "$SECRETS_FILE" OPENAI_API_KEY || true)"
              openai_model="$(read_env "$SECRETS_FILE" OPENAI_MODEL || true)"
              anthropic_api_key="$(read_env "$SECRETS_FILE" ANTHROPIC_API_KEY || true)"
              anthropic_model="$(read_env "$SECRETS_FILE" ANTHROPIC_MODEL || true)"
              github_token="$(read_env "$SECRETS_FILE" ORCHESTRATOR_GITHUB_TOKEN || true)"
              if [ -z "$github_token" ]; then
                github_token="$(read_env "$SECRETS_FILE" GITHUB_TOKEN || true)"
              fi
              github_api_version="$(read_env "$SECRETS_FILE" GITHUB_API_VERSION || true)"
              git_author_name="$(read_env "$SECRETS_FILE" ORCHESTRATOR_GIT_AUTHOR_NAME || true)"
              git_author_email="$(read_env "$SECRETS_FILE" ORCHESTRATOR_GIT_AUTHOR_EMAIL || true)"

              tmp_postgres="$(mktemp)"
              {
                printf 'POSTGRES_DB=n8n\n'
                printf 'POSTGRES_USER=n8n\n'
                printf 'POSTGRES_PASSWORD=%s\n' "$n8n_db_password"
              } > "$tmp_postgres"
              sudo install -m 0600 "$tmp_postgres" "$N8N_POSTGRES_ENV_FILE"
              rm -f "$tmp_postgres"

              tmp_n8n="$(mktemp)"
              {
                printf 'N8N_HOST=n8n\n'
                printf 'N8N_PORT=5678\n'
                printf 'N8N_PROTOCOL=http\n'
                printf 'N8N_ENCRYPTION_KEY=%s\n' "$n8n_encryption_key"
                printf 'N8N_DIAGNOSTICS_ENABLED=false\n'
                printf 'N8N_VERSION_NOTIFICATIONS_ENABLED=false\n'
                printf 'DB_TYPE=postgresdb\n'
                printf 'DB_POSTGRESDB_HOST=n8n-postgres\n'
                printf 'DB_POSTGRESDB_DATABASE=n8n\n'
                printf 'DB_POSTGRESDB_USER=n8n\n'
                printf 'DB_POSTGRESDB_PASSWORD=%s\n' "$n8n_db_password"
                printf 'ORCHESTRATOR_HUB_API_BASE_URL=http://app:8080\n'
                printf 'ORCHESTRATOR_N8N_CALLBACK_TOKEN=%s\n' "$callback_token"
                printf 'OPENAI_API_KEY=%s\n' "$openai_api_key"
                printf 'OPENAI_MODEL=%s\n' "${openai_model:-gpt-5.2}"
                printf 'ANTHROPIC_API_KEY=%s\n' "$anthropic_api_key"
                printf 'ANTHROPIC_MODEL=%s\n' "${anthropic_model:-claude-sonnet-4-20250514}"
                printf 'GITHUB_TOKEN=%s\n' "$github_token"
                printf 'GITHUB_API_VERSION=%s\n' "${github_api_version:-2026-03-10}"
                printf 'ORCHESTRATOR_GIT_AUTHOR_NAME=%s\n' "${git_author_name:-anton415-orchestrator}"
                printf 'ORCHESTRATOR_GIT_AUTHOR_EMAIL=%s\n' "${git_author_email:-orchestrator@anton415.local}"
              } > "$tmp_n8n"
              sudo install -m 0600 "$tmp_n8n" "$N8N_ENV_FILE"
              rm -f "$tmp_n8n"
            }

            copy_legacy_secret_if_missing() {
              key="$1"
              if env_has_nonempty_key "$SECRETS_FILE" "$key"; then
                return
              fi
              if ! env_has_nonempty_key "${OLD_APP_DIR}/secrets.env" "$key"; then
                return
              fi

              tmp="$(mktemp)"
              if [ -f "$SECRETS_FILE" ]; then
                sudo awk -F= -v key="$key" '$1 != key { print }' "$SECRETS_FILE" > "$tmp"
              fi
              sudo awk -F= -v key="$key" '$1 == key { print; exit }' "${OLD_APP_DIR}/secrets.env" >> "$tmp"
              sudo install -m 0600 "$tmp" "$SECRETS_FILE"
              rm -f "$tmp"
            }

            copy_env_secret_if_missing() {
              source_file="$1"
              key="$2"
              if env_has_nonempty_key "$SECRETS_FILE" "$key"; then
                return
              fi
              if ! env_has_nonempty_key "$source_file" "$key"; then
                return
              fi

              tmp="$(mktemp)"
              if [ -f "$SECRETS_FILE" ]; then
                sudo awk -F= -v key="$key" '$1 != key { print }' "$SECRETS_FILE" > "$tmp"
              fi
              sudo awk -F= -v key="$key" '$1 == key { print; exit }' "$source_file" >> "$tmp"
              sudo install -m 0600 "$tmp" "$SECRETS_FILE"
              rm -f "$tmp"
            }

            wait_for_new_postgres() {
              for _ in $(seq 1 30); do
                if sudo docker compose -f "$COMPOSE_FILE" exec -T postgres pg_isready -U "$DB_USER" -d "$DB_NAME"; then
                  return 0
                fi
                sleep 2
              done
              echo "New anton415 Hub PostgreSQL did not become ready in time" >&2
              return 1
            }

            wait_for_n8n_postgres() {
              for _ in $(seq 1 30); do
                if sudo docker compose -f "$COMPOSE_FILE" exec -T n8n-postgres pg_isready -U n8n -d n8n; then
                  return 0
                fi
                sleep 2
              done
              echo "n8n PostgreSQL did not become ready in time" >&2
              return 1
            }

            import_orchestrator_n8n_workflow() {
              if [ ! -f "$N8N_WORKFLOW_FILE" ]; then
                echo "n8n workflow file not found: $N8N_WORKFLOW_FILE" >&2
                exit 66
              fi

              sudo docker compose -f "$COMPOSE_FILE" stop n8n || true
              sudo docker compose -f "$COMPOSE_FILE" up -d n8n-postgres
              wait_for_n8n_postgres
              sudo docker compose -f "$COMPOSE_FILE" run --rm -T n8n import:workflow --input="/opt/n8n/workflows/${N8N_WORKFLOW_ID}.json"
              sudo docker compose -f "$COMPOSE_FILE" run --rm -T n8n update:workflow --id="$N8N_WORKFLOW_ID" --active=true
              sudo docker compose -f "$COMPOSE_FILE" run --rm -T n8n publish:workflow --id="$N8N_WORKFLOW_ID"
            }

            sudo mkdir -p "${APP_DIR}/caddy" "${APP_DIR}/migrations" "$N8N_WORKFLOW_DIR"
            if [ ! -f "$ENV_FILE" ] && [ -f "${OLD_APP_DIR}/app.env" ]; then
              sudo install -m 0600 "${OLD_APP_DIR}/app.env" "$ENV_FILE"
            fi
            if [ ! -f "$ENV_FILE" ]; then
              sudo install -m 0600 /dev/null "$ENV_FILE"
            fi

            upsert_env APP_ENV "production"
            upsert_env APP_VERSION "$app_version"
            upsert_env HTTP_ADDR ":8080"
            upsert_env STATIC_DIR "/app/web"
            upsert_env POSTGRES_HOST "postgres"
            upsert_env POSTGRES_PORT "5432"
            upsert_env POSTGRES_DB "$DB_NAME"
            upsert_env POSTGRES_USER "$DB_USER"
            upsert_env WEB_ORIGIN "https://anton415.ru"
            upsert_env AUTH_CALLBACK_BASE_URL "https://anton415.ru"
            upsert_env AUTH_SUCCESS_REDIRECT "https://anton415.ru/todo"
            upsert_env AUTH_FAILURE_REDIRECT "https://anton415.ru/"
            upsert_env AUTH_SESSION_COOKIE "anton415_hub_session"
            upsert_env AUTH_COOKIE_DOMAIN ""
            upsert_env AUTH_COOKIE_SECURE "true"
            upsert_env AUTH_RATE_LIMIT_ENABLED "true"
            upsert_env AUTH_RATE_LIMIT_REQUESTS "10"
            upsert_env AUTH_RATE_LIMIT_WINDOW "1m"
            upsert_env LOG_LEVEL "info"
            upsert_env SHUTDOWN_TIMEOUT "10s"
            upsert_env ORCHESTRATOR_N8N_FEATURE_INTAKE_URL "http://n8n:5678/webhook/orchestrator-feature-intake"
            upsert_env ORCHESTRATOR_N8N_APPROVAL_URL "http://n8n:5678/webhook/orchestrator-approval"
            upsert_env ORCHESTRATOR_N8N_OUTBOUND_TOKEN ""

            write_lockbox_sync_script
            sudo "${APP_DIR}/sync-lockbox-env.sh"
            if [ ! -f "$SECRETS_FILE" ]; then
              sudo install -m 0600 /dev/null "$SECRETS_FILE"
            fi
            for secret_key in \
              YANDEX_OAUTH_CLIENT_ID \
              YANDEX_OAUTH_CLIENT_SECRET \
              GITHUB_OAUTH_CLIENT_ID \
              GITHUB_OAUTH_CLIENT_SECRET \
              VK_OAUTH_CLIENT_ID \
              VK_OAUTH_CLIENT_SECRET \
              AWS_ACCESS_KEY_ID \
              AWS_SECRET_ACCESS_KEY \
              SMTP_USERNAME \
              SMTP_PASSWORD
            do
              copy_legacy_secret_if_missing "$secret_key"
            done
            copy_env_secret_if_missing "$ENV_FILE" POSTGRES_PASSWORD
            copy_env_secret_if_missing "$ENV_FILE" AUTH_ALLOWED_EMAILS
            if [ -f "${OLD_APP_DIR}/app.env" ]; then
              copy_env_secret_if_missing "${OLD_APP_DIR}/app.env" POSTGRES_PASSWORD
              copy_env_secret_if_missing "${OLD_APP_DIR}/app.env" AUTH_ALLOWED_EMAILS
            fi
            require_env_key "$SECRETS_FILE" POSTGRES_PASSWORD
            require_env_key "$SECRETS_FILE" AUTH_ALLOWED_EMAILS
            require_env_key "$SECRETS_FILE" YANDEX_OAUTH_CLIENT_ID
            require_env_key "$SECRETS_FILE" YANDEX_OAUTH_CLIENT_SECRET
            require_env_key "$SECRETS_FILE" ORCHESTRATOR_N8N_CALLBACK_TOKEN
            require_env_key "$SECRETS_FILE" N8N_POSTGRES_PASSWORD
            require_env_key "$SECRETS_FILE" N8N_ENCRYPTION_KEY
            require_env_key "$SECRETS_FILE" OPENAI_API_KEY
            require_env_key "$SECRETS_FILE" ANTHROPIC_API_KEY
            if ! env_has_nonempty_key "$SECRETS_FILE" ORCHESTRATOR_GITHUB_TOKEN && ! env_has_nonempty_key "$SECRETS_FILE" GITHUB_TOKEN; then
              echo "ORCHESTRATOR_GITHUB_TOKEN or GITHUB_TOKEN is required in $SECRETS_FILE after Lockbox sync" >&2
              exit 64
            fi
            write_postgres_env_file
            write_n8n_env_files
            for stale_secret_key in DATABASE_URL POSTGRES_PASSWORD AUTH_ALLOWED_EMAILS; do
              remove_env "$stale_secret_key"
            done

            sudo tee "${APP_DIR}/caddy/Caddyfile" >/dev/null <<'CADDY'
            (security_headers) {
              header {
                Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; upgrade-insecure-requests"
                Strict-Transport-Security "max-age=31536000; includeSubDomains"
                X-Frame-Options "DENY"
                X-Content-Type-Options "nosniff"
                Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)"
                Referrer-Policy "same-origin"
              }
            }

            anton415.ru {
              encode gzip zstd
              import security_headers

              reverse_proxy app:8080
            }
            CADDY

            sudo tee "$MIGRATE_SCRIPT" >/dev/null <<'MIGRATE'
            #!/bin/sh
            set -eu

            COMPOSE_FILE="/opt/anton415-hub/docker-compose.yml"
            APP_ENV_FILE="/opt/anton415-hub/app.env"
            SECRETS_FILE="/opt/anton415-hub/secrets.env"

            read_env() {
              file="$1"
              key="$2"
              [ -f "$file" ] || return 1
              awk -F= -v key="$key" '
                $1 == key {
                  sub(/^[^=]*=/, "")
                  print
                  found = 1
                  exit
                }
                END { exit found ? 0 : 1 }
              ' "$file"
            }

            require_env() {
              file="$1"
              key="$2"
              value="$(read_env "$file" "$key" || true)"
              if [ -z "$value" ]; then
                echo "$key is required in $file" >&2
                exit 64
              fi
              printf '%s' "$value"
            }

            db_user="$(require_env "$APP_ENV_FILE" POSTGRES_USER)"
            db_name="$(require_env "$APP_ENV_FILE" POSTGRES_DB)"
            db_password="$(require_env "$SECRETS_FILE" POSTGRES_PASSWORD)"
            db_host="$(read_env "$APP_ENV_FILE" POSTGRES_HOST || printf '%s' postgres)"
            db_port="$(read_env "$APP_ENV_FILE" POSTGRES_PORT || printf '%s' 5432)"

            database_url="$(python3 - "$db_user" "$db_host" "$db_port" "$db_name" <<'PY'
            import sys
            from urllib.parse import quote

            user, host, port, name = sys.argv[1:]
            print(f"postgres://{quote(user)}@{host}:{port}/{quote(name)}?sslmode=disable")
            PY
            )"

            PGPASSWORD="$db_password" docker compose -f "$COMPOSE_FILE" run --rm -e PGPASSWORD migrate -path /migrations -database "$database_url" up
            MIGRATE
            sudo chmod 0700 "$MIGRATE_SCRIPT"

            sudo tee "$COMPOSE_FILE" >/dev/null <<'COMPOSE'
            services:
              postgres:
                image: postgres:16-alpine
                restart: unless-stopped
                env_file:
                  - /opt/anton415-hub/app.env
                  - /opt/anton415-hub/postgres.env
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 12

              n8n-postgres:
                image: postgres:16-alpine
                restart: unless-stopped
                env_file:
                  - /opt/anton415-hub/n8n-postgres.env
                volumes:
                  - n8n_postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 12

              migrate:
                image: migrate/migrate:v4.18.3
                restart: "no"
                volumes:
                  - /opt/anton415-hub/migrations:/migrations:ro
                depends_on:
                  postgres:
                    condition: service_healthy

              app:
                image: __IMAGE__
                restart: unless-stopped
                env_file:
                  - /opt/anton415-hub/app.env
                  - /opt/anton415-hub/secrets.env
                expose:
                  - "8080"
                depends_on:
                  postgres:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
                  interval: 30s
                  timeout: 5s
                  retries: 5

              n8n:
                image: n8nio/n8n:2.20.9
                restart: unless-stopped
                env_file:
                  - /opt/anton415-hub/n8n.env
                expose:
                  - "5678"
                volumes:
                  - n8n_data:/home/node/.n8n
                  - /opt/anton415-hub/n8n/workflows:/opt/n8n/workflows:ro
                depends_on:
                  n8n-postgres:
                    condition: service_healthy

              caddy:
                image: caddy:2.8-alpine
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /opt/anton415-hub/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  - app

            volumes:
              postgres_data:
              n8n_postgres_data:
              n8n_data:
              caddy_data:
              caddy_config:
            COMPOSE
            sudo env IMAGE="$image" perl -0pi -e 's/__IMAGE__/$ENV{IMAGE}/g' "$COMPOSE_FILE"

            sudo docker pull "$image"
            container_id="$(sudo docker create "$image")"
            trap 'sudo docker rm "$container_id" >/dev/null 2>&1 || true' EXIT
            sudo rm -rf "${APP_DIR}/migrations"
            sudo docker cp "$container_id:/app/migrations" "${APP_DIR}/migrations"
            sudo rm -rf "${APP_DIR}/n8n/workflows"
            sudo mkdir -p "${APP_DIR}/n8n"
            sudo docker cp "$container_id:/app/deploy/n8n/workflows" "${APP_DIR}/n8n/workflows"
            sudo docker rm "$container_id"
            trap - EXIT

            if [ ! -f "$DB_MIGRATION_MARKER" ] && [ -f "$OLD_COMPOSE_FILE" ]; then
              echo "Migrating production data from legacy /opt/anton415-os to anton415 Hub"
              old_db_name="$(read_env "${OLD_APP_DIR}/app.env" POSTGRES_DB || true)"
              old_db_user="$(read_env "${OLD_APP_DIR}/app.env" POSTGRES_USER || true)"
              old_db_name="${old_db_name:-anton415_os}"
              old_db_user="${old_db_user:-anton415_app}"
              dump_file="$(mktemp)"
              trap 'rm -f "$dump_file"' EXIT

              sudo docker compose -f "$OLD_COMPOSE_FILE" up -d postgres
              sudo docker compose -f "$OLD_COMPOSE_FILE" stop app caddy || true
              sudo docker compose -f "$OLD_COMPOSE_FILE" exec -T postgres pg_dump --no-owner --no-privileges -U "$old_db_user" -d "$old_db_name" > "$dump_file"

              sudo docker compose -f "$COMPOSE_FILE" up -d postgres
              wait_for_new_postgres
              sudo docker compose -f "$COMPOSE_FILE" exec -T postgres psql -v ON_ERROR_STOP=1 -U "$DB_USER" -d "$DB_NAME" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
              sudo docker compose -f "$COMPOSE_FILE" exec -T postgres psql -v ON_ERROR_STOP=1 -U "$DB_USER" -d "$DB_NAME" < "$dump_file"
              sudo install -m 0644 /dev/null "$DB_MIGRATION_MARKER"
              rm -f "$dump_file"
              trap - EXIT
            else
              sudo docker compose -f "$COMPOSE_FILE" up -d postgres
              wait_for_new_postgres
            fi

            if [ -f "$OLD_COMPOSE_FILE" ]; then
              sudo docker compose -f "$OLD_COMPOSE_FILE" stop app caddy || true
            fi
            sudo "$MIGRATE_SCRIPT"
            import_orchestrator_n8n_workflow
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate n8n
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate app
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate caddy
            sudo docker compose -f "$COMPOSE_FILE" exec -T app wget -qO- http://127.0.0.1:8080/health
            sudo docker image prune -f

      - name: Revoke GitHub runner SSH
        if: always()
        shell: bash
        env:
          YC_APP_SECURITY_GROUP_ID: ${{ vars.YC_APP_SECURITY_GROUP_ID }}
          SSH_RULE_DESCRIPTION: github-actions-deploy-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if ! command -v yc >/dev/null 2>&1; then
            echo "Yandex Cloud CLI was not installed; no SSH ingress rule could have been created"
            exit 0
          fi
          if [ -z "$YC_APP_SECURITY_GROUP_ID" ]; then
            echo "YC_APP_SECURITY_GROUP_ID repository variable is missing; no cleanup target"
            exit 0
          fi

          mapfile -t rule_ids < <(yc vpc security-group get --id "$YC_APP_SECURITY_GROUP_ID" --format json \
            | jq -r --arg description "$SSH_RULE_DESCRIPTION" '.rules[]? | select(.description == $description) | .id')
          if [ "${#rule_ids[@]}" -eq 0 ]; then
            echo "No temporary SSH ingress rule found for this run"
            exit 0
          fi

          for rule_id in "${rule_ids[@]}"; do
            yc vpc security-group update-rules --id "$YC_APP_SECURITY_GROUP_ID" --delete-rule-id "$rule_id" >/dev/null
            echo "Revoked temporary SSH ingress rule ${rule_id}"
          done
