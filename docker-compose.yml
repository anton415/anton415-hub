services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anton415_hub}
      POSTGRES_USER: ${POSTGRES_USER:-anton415}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anton415}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-anton415} -d $${POSTGRES_DB:-anton415_hub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: golang:1.25-alpine
    working_dir: /workspace
    command: go run ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-dev}
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-anton415}:${POSTGRES_PASSWORD:-anton415}@postgres:5432/${POSTGRES_DB:-anton415_hub}?sslmode=disable
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      STATIC_DIR: ${STATIC_DIR:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS:-anton@example.com}
      AUTH_CALLBACK_BASE_URL: ${AUTH_CALLBACK_BASE_URL:-http://localhost:8080}
      AUTH_SUCCESS_REDIRECT: ${AUTH_SUCCESS_REDIRECT:-http://localhost:5173/todo}
      AUTH_FAILURE_REDIRECT: ${AUTH_FAILURE_REDIRECT:-http://localhost:5173/}
      AUTH_SESSION_COOKIE: ${AUTH_SESSION_COOKIE:-anton415_hub_session}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-720h}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-15m}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_DEV_BYPASS: ${AUTH_DEV_BYPASS:-true}
      AUTH_DEV_EMAIL: ${AUTH_DEV_EMAIL:-dev@localhost}
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_REQUESTS: ${AUTH_RATE_LIMIT_REQUESTS:-60}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW:-1m}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      YANDEX_OAUTH_CLIENT_ID: ${YANDEX_OAUTH_CLIENT_ID:-}
      YANDEX_OAUTH_CLIENT_SECRET: ${YANDEX_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      VK_OAUTH_CLIENT_ID: ${VK_OAUTH_CLIENT_ID:-}
      VK_OAUTH_CLIENT_SECRET: ${VK_OAUTH_CLIENT_SECRET:-}
      ORCHESTRATOR_N8N_FEATURE_INTAKE_URL: ${ORCHESTRATOR_N8N_FEATURE_INTAKE_URL:-http://n8n:5678/webhook/orchestrator-feature-intake}
      ORCHESTRATOR_N8N_APPROVAL_URL: ${ORCHESTRATOR_N8N_APPROVAL_URL:-http://n8n:5678/webhook/orchestrator-approval}
      ORCHESTRATOR_N8N_OUTBOUND_TOKEN: ${ORCHESTRATOR_N8N_OUTBOUND_TOKEN:-}
      ORCHESTRATOR_N8N_CALLBACK_TOKEN: ${ORCHESTRATOR_N8N_CALLBACK_TOKEN:-dev-orchestrator-token}
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    image: node:24
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      - api

  n8n-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-n8n} -d $${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:2.20.9
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-long-local-dev-secret}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Moscow}
      ORCHESTRATOR_HUB_API_BASE_URL: ${ORCHESTRATOR_HUB_API_BASE_URL:-http://api:8080}
      ORCHESTRATOR_N8N_CALLBACK_TOKEN: ${ORCHESTRATOR_N8N_CALLBACK_TOKEN:-dev-orchestrator-token}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      GITHUB_TOKEN: ${ORCHESTRATOR_GITHUB_TOKEN:-${GITHUB_TOKEN:-}}
      GITHUB_API_VERSION: ${GITHUB_API_VERSION:-2026-03-10}
      ORCHESTRATOR_GIT_AUTHOR_NAME: ${ORCHESTRATOR_GIT_AUTHOR_NAME:-anton415-orchestrator}
      ORCHESTRATOR_GIT_AUTHOR_EMAIL: ${ORCHESTRATOR_GIT_AUTHOR_EMAIL:-orchestrator@anton415.local}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy

  migrate:
    image: migrate/migrate:v4.18.3
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-anton415}:${POSTGRES_PASSWORD:-anton415}@postgres:5432/${POSTGRES_DB:-anton415_hub}?sslmode=disable",
        "up"
      ]
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  go_pkg_mod:
  go_build_cache:
  web_node_modules:
  n8n_postgres_data:
  n8n_data:
